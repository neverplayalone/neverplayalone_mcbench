resources:
  logs:
    display_name: logs
    # Pin the world to forest so trees are guaranteed near spawn (no ice-world).
    biome: minecraft:forest
    items:
      - oak_log
      - birch_log
      - spruce_log
      - jungle_log
      - acacia_log
      - dark_oak_log
      - mangrove_log
      - cherry_log
    target_range: [100, 150]
    points: 100

  cobblestone:
    display_name: cobblestone
    items:
      - cobblestone
    target_range: [50, 100]
    points: 100

  coal:
    display_name: coal
    items:
      - coal
    target_range: [8, 64]
    points: 100

  sand:
    display_name: sand
    items:
      - sand
      - red_sand
    target_range: [50, 100]
    points: 100

