services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: mcbench-server
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "mcbench"
      RCON_PORT: "25575"
      MODE: "creative"
      DIFFICULTY: "peaceful"
      LEVEL_TYPE: "FLAT"
      GENERATE_STRUCTURES: "FALSE"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "10"
      # OPS intentionally unset — itzg/minecraft-server tries to resolve names
      # via Playerdb (online API) at boot and fails for offline-mode-only names.
      # The runner ops the bot via RCON after it spawns.
      ALLOW_FLIGHT: "TRUE"
      SEED: "0"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ./data:/data
      # Mounted on top of the generated bukkit.yml to disable the connection
      # throttle (default 4000ms blocks back-to-back bot reconnects).
      - ./bukkit.yml:/data/bukkit.yml:ro
    stdin_open: true
    tty: true
    restart: "no"
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
