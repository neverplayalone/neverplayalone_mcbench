id: resource_gathering_v1
minecraft_version: "1.21.11"
world_type: normal
generate_structures: true
difficulty: peaceful
memory: 2G
duration_seconds: 120
spawn_time: 0
username: BenchmarkBot

kit:
  - item: netherite_pickaxe
    count: 1
  - item: netherite_axe
    count: 1
  - item: netherite_shovel
    count: 1
  - item: cooked_beef
    count: 64
  - item: torch
    count: 64
  - item: water_bucket
    count: 1
  - item: shield
    count: 1
    slot: weapon.offhand

scoring:
  # Final score = resource_score * distance_multiplier, by distance from spawn at
  # the end. Each [max_distance, multiplier] applies at or below that distance;
  # beyond the last band the multiplier is distance_floor_mult.
  # Time-to-finish is not scored; it only breaks ties between equal scores.
  distance_bands:
    - [20, 1.0]
    - [50, 0.9]
    - [80, 0.8]
    - [110, 0.7]
    - [140, 0.6]
  distance_floor_mult: 0.5
